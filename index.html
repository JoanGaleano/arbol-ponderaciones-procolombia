<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identificación de Funcionarios · ProColombia 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#EFEFEB;--border:#E0DED8;--border2:#CCCAC3;
    --text:#1A1916;--text2:#6B6960;--text3:#9B9A94;
    --purple-bg:#EEEDFE;--purple:#3C3489;--purple-mid:#534AB7;--purple-border:#AFA9EC;
    --green-bg:#E1F5EE;--green:#085041;--green-mid:#0F6E56;--green-border:#5DCAA5;
    --amber-bg:#FAEEDA;--amber:#633806;--amber-mid:#854F0B;--amber-border:#FAC775;
    --blue-bg:#E6F1FB;--blue:#0C447C;--blue-mid:#185FA5;--blue-border:#85B7EB;
    --coral-bg:#FAECE7;--coral:#712B13;--coral-mid:#993C1D;--coral-border:#F0997B;
    --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
  .logo-mark{width:36px;height:36px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo-mark span{color:white;font-weight:600;font-size:15px;letter-spacing:-.5px}
  .header-text h1{font-size:15px;font-weight:600;color:var(--text);line-height:1.2}
  .header-text p{font-size:12px;color:var(--text3);margin-top:1px}
  .header-badge{margin-left:auto;background:var(--purple-bg);color:var(--purple);font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:1px solid var(--purple-border);white-space:nowrap}
  .page{max-width:780px;margin:0 auto;padding:40px 20px 80px}
  .progress-wrap{margin-bottom:32px}
  .progress-steps{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .progress-step{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);font-weight:500;transition:color .2s}
  .progress-step.active{color:var(--text2)}.progress-step.done{color:var(--purple)}
  .step-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background .2s;flex-shrink:0}
  .progress-step.active .step-dot{background:var(--text2)}.progress-step.done .step-dot{background:var(--purple)}
  .step-arrow{color:var(--border2);font-size:10px}
  .step-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:12px;box-shadow:var(--shadow);animation:fadeUp .25s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .step-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .step-num{width:22px;height:22px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;font-family:'DM Mono',monospace}
  .step-title{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.03em;text-transform:uppercase}
  .step-selected-badge{margin-left:auto;font-size:12px;font-weight:500;color:var(--purple);background:var(--purple-bg);padding:3px 10px;border-radius:20px;border:1px solid var(--purple-border)}
  .chip-group{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .15s;line-height:1.3;text-align:left}
  .chip:hover{transform:translateY(-1px)}
  .chip.sel{font-weight:500}
  .chip-id:hover,.chip-id.sel{border-color:var(--purple-mid);color:var(--purple);background:var(--purple-bg)}
  .chip-loc:hover,.chip-loc.sel{border-color:var(--green-mid);color:var(--green);background:var(--green-bg)}
  .chip-area:hover,.chip-area.sel{border-color:var(--blue-mid);color:var(--blue);background:var(--blue-bg)}
  .chip-loc2:hover,.chip-loc2.sel{border-color:var(--amber-mid);color:var(--amber);background:var(--amber-bg)}
  .chip-rst:hover,.chip-rst.sel{border-color:var(--coral-mid);color:var(--coral);background:var(--coral-bg)}
  .result-wrap{max-width:780px;margin:0 auto}
  .result-header{margin-bottom:16px}
  .crumb{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:8px}
  .crumb-item{font-size:11px;color:var(--text2);font-weight:500}
  .crumb-sep{font-size:11px;color:var(--border2)}
  .result-count{font-size:12px;color:var(--text3)}
  .person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);animation:fadeUp .2s ease both}
  .person-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--purple-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--purple);flex-shrink:0}
  .person-name{font-size:15px;font-weight:500;color:var(--text);line-height:1.3}
  .roles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .role-block{background:var(--surface2);border-radius:8px;padding:10px 12px}
  .role-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
  .erol-pill{display:inline-block;background:var(--green-bg);color:var(--green);font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid var(--green-border);line-height:1.4}
  .fidu-pill{display:inline-block;background:var(--blue-bg);color:var(--blue);font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid var(--blue-border);line-height:1.4}
  .reset-row{display:flex;justify-content:center;margin-top:24px}
  .reset-btn{background:none;border:1.5px solid var(--border2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .15s}
  .reset-btn:hover{border-color:var(--purple-mid);color:var(--purple);background:var(--purple-bg)}
  .root-node{background:var(--purple-bg);color:var(--purple);border-radius:var(--radius);padding:9px 24px;font-size:14px;font-weight:500;border:1.5px solid var(--purple-border);margin-bottom:20px;text-align:center}
  @media(max-width:500px){header{padding:14px 16px}.page{padding:24px 12px 60px}.step-block{padding:16px}.roles-grid{grid-template-columns:1fr}}
</style>
</head>

const STEPS=[
  {key:'id',  label:'Identificación',         cls:'chip-id'},
  {key:'loc', label:'Localización',            cls:'chip-loc'},
  {key:'area',label:'Área',                    cls:'chip-area'},
  {key:'loc2',label:'Localización específica', cls:'chip-loc2'},
  {key:'rst', label:'Rol estándar',            cls:'chip-rst'},
];
const S={id:null,loc:null,area:null,loc2:null,rst:null};

function keys(o){return Object.keys(o||{}).sort();}

function getOpts(step){
  const {id,loc,area,loc2}=S;
  if(step==='id')  return keys(T);
  if(step==='loc') return keys(T[id]);
  if(step==='area')return keys(T[id][loc]);
  if(step==='loc2')return keys(T[id][loc][area]);
  if(step==='rst') return keys(T[id][loc][area][loc2]);
  return[];
}

function initials(n){const p=n.trim().split(' ').filter(Boolean);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase();}

function render(){
  const container=document.getElementById('steps-container');
  const resWrap=document.getElementById('result-wrap');
  container.innerHTML='';

  const prog=document.getElementById('progress-steps');
  prog.innerHTML=STEPS.map((s,i)=>{
    const val=S[s.key];
    const fi=STEPS.findIndex(x=>!S[x.key]);
    const cls=val?'done':(i===fi?'active':'');
    return`<span class="progress-step ${cls}"><span class="step-dot"></span>${s.label}</span>${i<STEPS.length-1?'<span class="step-arrow">›</span>':''}`;
  }).join('');

  STEPS.forEach((step,i)=>{
    const val=S[step.key];
    const prevKey=i>0?STEPS[i-1].key:null;
    if(i>0&&!S[prevKey]) return;

    const block=document.createElement('div');
    block.className='step-block';
    block.style.animationDelay=(i*.04)+'s';
    const opts=getOpts(step.key);
    const sl=val?val:null;

    block.innerHTML=`
      <div class="step-header">
        <div class="step-num">${i+1}</div>
        <div class="step-title">${step.label}</div>
        ${sl?`<div class="step-selected-badge">${sl}</div>`:''}
      </div>
      <div class="chip-group">
        ${opts.map(o=>`<button class="chip ${step.cls} ${val===o?'sel':''}" onclick="pick('${step.key}',this)">${o}</button>`).join('')}
      </div>`;
    container.appendChild(block);
  });

  if(S.rst){
    const people=T[S.id][S.loc][S.area][S.loc2][S.rst]||[];
    const parts=[S.id,S.loc,S.area,S.loc2,S.rst];
    document.getElementById('crumb').innerHTML=parts.map((t,i)=>(i?'<span class="crumb-sep"> › </span>':'')+`<span class="crumb-item">${t}</span>`).join('');
    document.getElementById('result-count').textContent=people.length===1?'1 funcionario encontrado':`${people.length} funcionarios encontrados`;
    document.getElementById('result-cards').innerHTML=people.map((p,i)=>`
      <div class="person-card" style="animation-delay:${i*.05}s">
        <div class="person-header">
          <div class="avatar">${initials(p.nombre)}</div>
          <div class="person-name">${p.nombre}</div>
        </div>
        <div class="roles-grid">
          <div class="role-block">
            <div class="role-label">E_Rol</div>
            <span class="erol-pill">${p.erol.trim()}</span>
          </div>
          <div class="role-block">
            <div class="role-label">Rol (Fiducoldex)</div>
            <span class="fidu-pill">${p.rol_fidu}</span>
          </div>
        </div>
      </div>`).join('');
    resWrap.style.display='block';
  } else {
    resWrap.style.display='none';
  }
}

function pick(stepKey,btn){
  const val=btn.textContent.trim();
  S[stepKey]=val;
  const order=['id','loc','area','loc2','rst'];
  order.slice(order.indexOf(stepKey)+1).forEach(k=>S[k]=null);
  render();
  setTimeout(()=>{
    const blocks=document.querySelectorAll('.step-block');
    const ni=order.findIndex(k=>!S[k]);
    if(ni>=0&&blocks[ni]) blocks[ni].scrollIntoView({behavior:'smooth',block:'center'});
    else document.getElementById('result-wrap').scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}

function resetAll(){
  Object.keys(S).forEach(k=>S[k]=null);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
